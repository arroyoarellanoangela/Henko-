# GPU variant — requires NVIDIA Container Toolkit
# Usage: docker compose -f docker-compose.gpu.yml up --build

services:
  kaizen:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_DIR=/app/data/chroma
      - KNOWLEDGE_DIR=/app/data/knowledge
      - LOG_FORMAT=json
    secrets:
      - LLM_API_KEY
      - FALLBACK_API_KEY
      - API_KEYS
    volumes:
      - chroma-data:/app/data/chroma
      - eval-data:/app/data/eval
      - domain-data:/app/data/domains
      - finetune-data:/app/data/finetune
      - ./knowledge:/app/data/knowledge:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/api/health',timeout=3); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

secrets:
  LLM_API_KEY:
    file: ./secrets/LLM_API_KEY
  FALLBACK_API_KEY:
    file: ./secrets/FALLBACK_API_KEY
  API_KEYS:
    file: ./secrets/API_KEYS

volumes:
  chroma-data:
  eval-data:
  domain-data:
  finetune-data:
