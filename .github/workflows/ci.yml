name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (CPU)
        run: docker build -t kaizen:ci .

      - name: Verify image runs
        run: |
          docker run --rm -d --name kaizen-ci -p 8000:8000 \
            -e LLM_PROVIDER=ollama \
            -e OLLAMA_URL=http://localhost:11434 \
            kaizen:ci
          sleep 5
          docker logs kaizen-ci || true
          docker stop kaizen-ci || true
