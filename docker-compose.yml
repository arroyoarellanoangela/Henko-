services:
  # ---------- API + Frontend (CPU) ----------
  suyven:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_DIR=/app/data/chroma
      - KNOWLEDGE_DIR=/app/data/knowledge
      - LOG_FORMAT=json
    secrets:
      - LLM_API_KEY
      - FALLBACK_API_KEY
      - API_KEYS
    volumes:
      - chroma-data:/app/data/chroma
      - eval-data:/app/data/eval
      - domain-data:/app/data/domains
      - finetune-data:/app/data/finetune
      - ./knowledge:/app/data/knowledge:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/api/health',timeout=3); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

secrets:
  LLM_API_KEY:
    file: ./secrets/LLM_API_KEY       # echo "your-key" > secrets/LLM_API_KEY
  FALLBACK_API_KEY:
    file: ./secrets/FALLBACK_API_KEY
  API_KEYS:
    file: ./secrets/API_KEYS           # echo "key1,key2" > secrets/API_KEYS

volumes:
  chroma-data:
  eval-data:
  domain-data:
  finetune-data:
